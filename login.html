<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Trị - Smart Room Finder</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --primary-color: #10b981;
            --primary-hover: #059669;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --error-color: #ef4444;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng bong bóng ánh sáng nền (Glowing Orbs) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.4;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: var(--primary-color);
            top: -50px;
            left: -50px;
            animation: moveOrb1 15s infinite alternate ease-in-out;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #2563eb;
            bottom: -80px;
            right: -80px;
            animation: moveOrb2 18s infinite alternate ease-in-out;
        }

        @keyframes moveOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 50px) scale(1.2); }
        }

        @keyframes moveOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-100px, -60px) scale(1.15); }
        }

        /* Thẻ Container Đăng Nhập Glassmorphism */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 40px;
            color: var(--primary-color);
            background: rgba(16, 185, 129, 0.1);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.1);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: -8px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            border-color: var(--primary-color);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .form-input:focus + .input-icon {
            color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-color);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-note a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <span class="logo-text">Smart Room Finder</span>
            <span class="logo-sub">HỆ THỐNG QUẢN TRỊ ADMIN</span>
        </div>

        <div class="error-message" id="error-box">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">Lỗi đăng nhập!</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Tài khoản</label>
                <div class="input-wrapper">
                    <input class="form-input" type="text" id="username" placeholder="Nhập tài khoản admin..." required autocomplete="username">
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mật khẩu</label>
                <div class="input-wrapper">
                    <input class="form-input" type="password" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span>Đăng Nhập</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="footer-note">
            Quay lại trang chính <a href="http://localhost:3000">Smart Room Finder</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submit-btn');

            // Reset trạng thái
            errorBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang xác thực...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Chuyển hướng về trang Dashboard Admin chính
                    window.location.href = '/index.html';
                } else {
                    errorText.textContent = data.error || 'Tài khoản hoặc mật khẩu không đúng!';
                    errorBox.style.display = 'flex';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Đăng Nhập</span> <i class="fa-solid fa-arrow-right"></i>';
                }
            } catch (err) {
                errorText.textContent = 'Lỗi kết nối tới máy chủ quản trị!';
                errorBox.style.display = 'flex';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Đăng Nhập</span> <i class="fa-solid fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
